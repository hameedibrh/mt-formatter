<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="256" y2="256" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0F2027"/>
      <stop offset="50%" stop-color="#203A43"/>
      <stop offset="100%" stop-color="#2C5364"/>
    </linearGradient>
    <linearGradient id="accent" x1="60" y1="60" x2="200" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#00B4D8"/>
      <stop offset="100%" stop-color="#0077B6"/>
    </linearGradient>
    <linearGradient id="gold" x1="80" y1="140" x2="180" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F4A261"/>
      <stop offset="100%" stop-color="#E76F51"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="256" height="256" rx="48" fill="url(#bg)"/>

  <!-- Decorative border lines -->
  <rect x="16" y="16" width="224" height="224" rx="36" stroke="url(#accent)" stroke-width="1.5" fill="none" opacity="0.3"/>

  <!-- MT text -->
  <text x="128" y="108" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="72" font-weight="800" fill="url(#accent)" letter-spacing="-2">MT</text>

  <!-- Horizontal rule -->
  <line x1="60" y1="122" x2="196" y2="122" stroke="url(#gold)" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Field tag representation :20: -->
  <text x="128" y="158" text-anchor="middle" font-family="'Courier New', monospace" font-size="28" font-weight="600" fill="#CAF0F8" opacity="0.9">:tag:value</text>

  <!-- SWIFT label -->
  <text x="128" y="192" text-anchor="middle" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="18" font-weight="600" fill="url(#gold)" letter-spacing="6" opacity="0.85">SWIFT</text>

  <!-- Format icon - curly braces -->
  <text x="38" y="108" text-anchor="middle" font-family="'Courier New', monospace" font-size="48" font-weight="300" fill="#CAF0F8" opacity="0.2">{</text>
  <text x="218" y="108" text-anchor="middle" font-family="'Courier New', monospace" font-size="48" font-weight="300" fill="#CAF0F8" opacity="0.2">}</text>

  <!-- Small decorative dots -->
  <circle cx="72" cy="210" r="3" fill="url(#accent)" opacity="0.4"/>
  <circle cx="128" cy="218" r="2" fill="url(#accent)" opacity="0.3"/>
  <circle cx="184" cy="210" r="3" fill="url(#accent)" opacity="0.4"/>
</svg>
